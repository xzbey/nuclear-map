<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nuclear map</title>

        <script src="https://unpkg.com/leaflet@1.0.1/dist/leaflet.js"></script>
        <link href="https://unpkg.com/leaflet@1.0.1/dist/leaflet.css" rel="stylesheet"/>
        
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

        <link rel="stylesheet" href="styles.css">

    </head>

    <body>

        <div class="filters">
            <div class="filter-group">
                <label for="country-filter">Country</label>
                <select id="country-filter">
                    <option value="All">All</option>
                    <option value="USA">USA</option>
                    <option value="USSR">USSR</option>
                    <option value="UK">UK</option>
                    <option value="FR">France</option>
                    <option value="PRC">China</option>
                    <option value="India">India</option>
                    <option value="Pakistan">Pakistan</option>
                    <option value="North Korea">North Korea</option>
                    <option value="Unknown (Republic of South Africa?)">Unknown (Republic of South Africa?)</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="strike-filter">Impact</label>
                <select id="strike-filter">
                    <option value="All">All</option>
                    <option value="strike">Strike</option>
                    <option value="test">Test</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Year: <span id="yearValue">2009</span></label>
                <input type="range" id="yearSlider" min="1944" max="2009" value="2009">
            </div>
        </div>

        <div class="changing-maps">
            <button onclick="switchTileLayer('satellite')">Satellite</button>
            <button onclick="switchTileLayer('osm')">OSM</button>
            <button onclick="switchTileLayer('dark')">Dark</button>
            <button onclick="switchTileLayer('topo')">Topo</button>
        </div>

        <div class="instruction">
            <button onclick="window.open('https://github.com/xzbey/nuclear-map', '_blank')">DETAILS</button>
        </div>

        <div id="map"></div>

        <script src="scripts.js"></script>
        <script src="utils.js"></script>
        <script>createMap();
                placeMarkers();</script>
    </body>
</html>
